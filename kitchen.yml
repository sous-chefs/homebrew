---
driver:
  name: exec

transport:
  name: exec

provisioner:
  name: chef_infra
  chef_omnibus_install: false
  chef_license: accept
  deprecations_as_errors: true

verifier:
  name: inspec
  sudo: false

platforms:
  - name: macos-latest

x-run_lists:
  default: &default_run_list
    - recipe[test::default]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier
